; 动态库加载测试配置。需先执行：
;   cmake -S . -B build -DNV_VERSION=1.0.0
;   cmake --build build

loadlib "build/lib/libnv_loadlib_alpha.so" "name=alpha debug=1"
loadlib "build/lib/libnv_loadlib_beta.so" "name=beta dms=172.200.2.14 443"

[main]
daemon = false
pid_file = /tmp/nv-loadlib-test.pid

[log]
log_file = /tmp/nv-loadlib-test.log
log_level = debug
console = true

[worker]
threads = 1
connections = 128
processes = 0

[ipc]
mq_name = /nv_loadlib_test_mq

[daemon]
heartbeat_interval = 0
shutdown_timeout = 5
max_open_files = 0
core_limit = -1
ctl_socket = /tmp/nv-loadlib-test.ctl.sock
instance_lock = libnv-loadlib-test

[cli]
telnet_enable = false
telnet_port = 2323
telnet_bind = 127.0.0.1
username = admin
password = nvadmin
