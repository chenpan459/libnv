; libnv 主进程配置文件（INI 格式，额外支持顶层 loadlib 指令）
; 开发环境示例；量产请参考 etc/nv.conf.embedded

[main]
daemon = false
pid_file = /tmp/nv.pid

[log]
log_file = /tmp/nv.log
log_level = info
syslog = false
console = true
queue_size = 2048
overflow = drop
rotate_max_mb = 4
rotate_keep = 3

[worker]
threads = 1
connections = 128
processes = 0
respawn = true

[ipc]
mq_name = /nv_core_mq_demo
pubsub_socket = /tmp/nv_pubsub.sock

[daemon]
heartbeat_interval = 60
shutdown_timeout = 30
systemd_notify = false
max_open_files = 65535
core_limit = -1
ctl_socket = /tmp/nv.ctl.sock
instance_lock = libnv
tombstone_file = /tmp/nv.tombstone

[cli]
telnet_enable = false
telnet_port = 2000
telnet_bind = 127.0.0.1
username = admin
; 生产环境请设置至少 8 字符强密码
password =

[loadlib]
; 量产：仅允许 plugin_dir 下的 .so 文件名
plugin_dir = /usr/lib/nv/plugins
; 开发：允许配置中的绝对/相对路径
allow_absolute = true

[watchdog]
enable = false
device = /dev/watchdog

[metrics]
publish = true
topic = nv/metrics

; 开发用插件（allow_absolute=true 时生效）
loadlib "build/lib/libnv_loadlib_alpha.so" "name=alpha debug=1"
loadlib "build/lib/libnv_loadlib_beta.so" "name=beta"
