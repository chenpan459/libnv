; libnv 主进程配置文件（INI 格式）
; 支持 [section]、key = value、行尾 ; 注释

[protocol]               ; Protocol configuration
version = 6              ; IPv6

[user]
name = Bob Smith         ; Spaces around '=' are stripped
email = bob@smith.com    ; And comments (like this) ignored
active = true            ; Test a boolean
pi = 3.14159             ; Test a floating point number
trillion = 1000000000000 ; Test 64-bit integers

[main]
daemon = false
pid_file = /var/run/nv.pid

[log]
log_file = /var/log/nv.log
log_level = info           ; debug|info|notice|warning|error|crit|fatal
syslog = false
console = true             ; 前台运行时输出到终端（stderr）
queue_size = 2048          ; 异步日志队列条数（须在进程启动前生效）
overflow = drop            ; 队列满: drop|overwrite (block 同 drop，业务线程不阻塞)

[worker]
threads = 4
connections = 1024
; fork 出的 worker 进程数，0 或 1 表示单进程
processes = 0
; worker 异常退出后是否由 master 重新拉起（re-exec）
respawn = true

[ipc]
mq_name = /nv_core_mq

[daemon]
; 周期心跳日志间隔（秒），0=关闭
heartbeat_interval = 60
; 收到退出信号后最长等待秒数，超时强制退出
shutdown_timeout = 30
; systemd Type=notify 时发送 READY/WATCHDOG/STOPPING（也可由 NOTIFY_SOCKET 自动检测）
systemd_notify = false
; 资源限制：0 表示不修改
max_open_files = 65535
; core dump：0 禁用，-1 不限制（字节数，也可填 unlimited 语义用 -1）
core_limit = -1
; Unix 控制套接字：status / reload / quit
ctl_socket = /var/run/nv.ctl.sock
; 抽象 Unix 锁名，防止双实例
instance_lock = libnv

[cli]
; Telnet 远程管理（默认仅本机）
telnet_enable = true
telnet_port = 2000
telnet_bind = 127.0.0.1
username = admin
password = 123456
